# WARNING: Another existing extension already uses the id 'rpmspec' and is called 'RPM Spec'.
id = "rpmspec-auto"
name = "RPMSpec with included Language Server"
version = "0.2.0"
schema_version = 1
authors = ["Mike Alexander <github@trackit.fe80.email>"]
description = "Language support for RPM Spec files, including syntax highlighting, completions, hover, go-to-definition, and find-references."
repository = "https://github.com/mtalexan/zed-rpm-spec-extension"

# Grammar from https://github.com/cryptomilk/tree-sitter-rpmspec (MIT license)
# This repo uses a multi-grammar layout: rpmspec/ and rpmbash/ are subdirectories.
# Zed resolves the grammar path from the tree-sitter.json in the repo root.
[grammars.rpmspec]
repository = "https://github.com/cryptomilk/tree-sitter-rpmspec"
rev = "01e5b9ed82eedb0d70b250406849c90e833f0a0a"
path = "rpmspec"

[grammars.rpmbash]
repository = "https://github.com/cryptomilk/tree-sitter-rpmspec"
rev = "01e5b9ed82eedb0d70b250406849c90e833f0a0a"
path = "rpmbash"

[language_servers.rpm-spec-lsp]
name = "RPMSpec Language Server"
# WARNING: The name 'RPM Spec' is used another extension: https://github.com/mtorromeo/zed-rpmspec-language,
#          so use a slightly different name to avoid conflicts rather than users who accidentally have both
#          not knowing which they're getting when they pick from the language list.
languages = ["RPMSpec"]

snippets = ["./snippets/rpmspec.json"]
