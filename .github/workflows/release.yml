name: Release rpm-spec-lsp binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: rpm-spec-lsp-linux-x86_64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: rpm-spec-lsp-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: rpm-spec-lsp-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build rpm-spec-lsp
        run: |
          cargo build --release --manifest-path rpm-spec-lsp/Cargo.toml --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          mv rpm-spec-lsp/target/${{ matrix.target }}/release/rpm-spec-lsp \
             ${{ matrix.artifact_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
